<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Page</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a1628;
    --bg2: #0e1e3a;
    --accent: #1e4d8c;
    --gear-fill: #152a4e;
    --gear-stroke: #2a5fa8;
    --text: #d0dff5;
    --text-dim: #6b8ab5;
    --white: #ffffff;
    --curve: #1a3a6e;
  }

  html, body {
    width: 100%; height: 100%; overflow-x: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 3rem;
    background: rgba(10,22,40,0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(42,95,168,0.25);
  }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem; letter-spacing: 0.12em;
    color: var(--white);
  }
  .nav-links { display: flex; gap: 0.5rem; }
  .nav-links a {
    color: var(--text); text-decoration: none;
    font-size: 0.82rem; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.45rem 1.1rem;
    border: 1px solid transparent;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .nav-links a:hover {
    color: var(--white);
    border-color: rgba(42,95,168,0.6);
    background: rgba(42,95,168,0.12);
  }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    padding-top: 5rem;
  }

  /* Decorative wave SVG background */
  .wave-bg {
    position: absolute; inset: 0; pointer-events: none;
  }

  /* ── GEARS ── */
  .gear-wrap {
    position: absolute; pointer-events: none;
  }
  .gear-tl  { top: 8%;  left: 2%;  }
  .gear-bl  { bottom: 6%; left: 3%; }
  .gear-br  { bottom: 4%; right: 4%; }
  .gear-tr  { top: 12%; right: 6%; }

  .gear-svg { display: block; }

  @keyframes spin-cw  { to { transform: rotate(360deg);  } }
  @keyframes spin-ccw { to { transform: rotate(-360deg); } }

  .spin-cw  { animation: spin-cw  12s linear infinite; transform-origin: center; }
  .spin-ccw { animation: spin-ccw  9s linear infinite; transform-origin: center; }
  .spin-slow{ animation: spin-cw  20s linear infinite; transform-origin: center; }

  /* ── CENTER GEAR ── */
  .center-gear-wrap {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center; gap: 2.5rem;
  }

  .center-gear-container {
    position: relative; width: 340px; height: 340px;
    display: flex; align-items: center; justify-content: center;
  }
  .center-gear-svg {
    position: absolute; inset: 0;
    animation: spin-cw 18s linear infinite;
    transform-origin: center;
  }

  .gear-inner-text {
    position: relative; z-index: 3;
    text-align: center; pointer-events: none;
    user-select: none;
  }
  .gear-inner-text .motto1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.55rem; letter-spacing: 0.18em;
    color: #9ab6d8;
    line-height: 1.1;
  }
  .gear-inner-text .motto2 {
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.22em;
    text-transform: uppercase; color: #4a7abf;
    margin-top: 0.35rem;
  }

  /* ── CTA BLOCK ── */
  .cta-block { text-align: center; }
  .cta-block h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 6vw, 5rem);
    letter-spacing: 0.1em;
    color: var(--white);
    line-height: 1;
    margin-bottom: 0.6rem;
  }
  .cta-block p {
    font-size: 0.92rem; color: var(--text-dim);
    font-weight: 300; letter-spacing: 0.04em;
    margin-bottom: 1.8rem;
  }
  .btn-register {
    display: inline-block;
    background: var(--white);
    color: var(--bg);
    font-family: 'Barlow', sans-serif;
    font-size: 0.82rem; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    text-decoration: none;
    padding: 0.85rem 2.8rem;
    border-radius: 999px;
    border: none; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 30px rgba(255,255,255,0.08);
  }
  .btn-register:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255,255,255,0.18);
  }
  .btn-register:active { transform: scale(0.97); }

  /* layout */
  .hero-inner {
    display: flex; align-items: center; gap: 5vw;
    z-index: 2; position: relative;
    flex-wrap: wrap; justify-content: center;
    padding: 2rem;
  }

  @media (max-width: 700px) {
    nav { padding: 1rem 1.2rem; }
    .nav-links a { padding: 0.4rem 0.7rem; font-size: 0.75rem; }
    .center-gear-container { width: 250px; height: 250px; }
    .gear-tl, .gear-tr { display: none; }
  }
</style>
</head>
<body>

<nav>
  <span class="nav-logo">Manufacture</span>
  <div class="nav-links">
    <a href="#">Button 1</a>
    <a href="#">Button 2</a>
    <a href="#">Button 3</a>
    <a href="#">Button 4</a>
  </div>
</nav>

<section class="hero">

  <!-- wavy background line -->
  <svg class="wave-bg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <path d="M-100 500 Q200 200 500 450 T1000 380 T1540 420" fill="none" stroke="#1a3a6e" stroke-width="1.5" opacity="0.5"/>
    <path d="M-100 560 Q300 300 600 500 T1100 440 T1540 480" fill="none" stroke="#1a3a6e" stroke-width="0.8" opacity="0.3"/>
  </svg>

  <!-- top-left gear cluster -->
  <div class="gear-wrap gear-tl">
    <svg class="gear-svg spin-ccw" width="90" height="90" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <use href="#gear-shape" fill="#152a4e" stroke="#2a5fa8" stroke-width="1.5"/>
    </svg>
    <svg class="gear-svg spin-cw" width="52" height="52" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="margin-left:60px;margin-top:-30px">
      <use href="#gear-shape" fill="#0e1e3a" stroke="#1e4d8c" stroke-width="2"/>
    </svg>
  </div>

  <!-- top-right gear -->
  <div class="gear-wrap gear-tr">
    <svg class="gear-svg spin-cw" width="68" height="68" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <use href="#gear-shape" fill="#152a4e" stroke="#2a5fa8" stroke-width="1.5"/>
    </svg>
  </div>

  <!-- bottom-left gear cluster -->
  <div class="gear-wrap gear-bl">
    <svg class="gear-svg spin-slow" width="110" height="110" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <use href="#gear-shape" fill="#0e1e3a" stroke="#1e4d8c" stroke-width="1.5"/>
    </svg>
    <svg class="gear-svg spin-ccw" width="58" height="58" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="margin-left:72px;margin-top:-40px">
      <use href="#gear-shape" fill="#152a4e" stroke="#2a5fa8" stroke-width="2"/>
    </svg>
  </div>

  <!-- bottom-right gear -->
  <div class="gear-wrap gear-br">
    <svg class="gear-svg spin-ccw" width="95" height="95" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <use href="#gear-shape" fill="#152a4e" stroke="#2a5fa8" stroke-width="1.5"/>
    </svg>
    <svg class="gear-svg spin-cw" width="48" height="48" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="margin-left:62px;margin-top:-32px">
      <use href="#gear-shape" fill="#0e1e3a" stroke="#1e4d8c" stroke-width="2"/>
    </svg>
  </div>

  <!-- reusable gear path -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <symbol id="gear-shape" viewBox="0 0 100 100">
        <path d="
          M50 5
          L55 5 L57 15
          Q63 17 68 21
          L78 15 L82 19
          L76 29

          L82 71 L78 75

          L55 85 L50 85
          L45 85 L43 75
          Q37 73 32 69
          L22 75 L18 71
          L24 61
          Q20 56 18 50
          L8 48 L8 42
          L18 40
          Q20 34 24 29
          L18 19 L22 15
          L32 21
          Q37 17 43 15
          L45 5 Z
          M50 30 A20 20 0 1 1 50 70 A20 20 0 1 1 50 30Z
        " fill-rule="evenodd"/>
      </symbol>
    </defs>
  </svg>

  <div class="hero-inner">
    <!-- Center spinning gear with motto -->
    <div class="center-gear-wrap">
      <div class="center-gear-container">
        <svg class="center-gear-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="
            M50 4 L55.5 4 L57.5 14
            Q64 16.5 69.5 20.5
            L79.5 14.5 L84 19
            L78 29
            Q82 35 83.5 42
            L93.5 44 L93.5 56
            L83.5 58
            Q82 65 78 71
            L84 81 L79.5 85.5
            L69.5 79.5

            L55.5 96 L44.5 96
            L42.5 86
            Q36 83.5 30.5 79.5
            L20.5 85.5 L16 81
            L22 71
            Q18 65 16.5 58
            L6.5 56 L6.5 44
            L16.5 42
            Q18 35 22 29
            L16 19 L20.5 14.5
            L30.5 20.5
            Q36 16.5 42.5 14
            L44.5 4 Z
            M50 28 A22 22 0 1 1 50 72 A22 22 0 1 1 50 28Z
          "
          fill="#1a3560" stroke="#2a5fa8" stroke-width="0.8" fill-rule="evenodd"/>
        </svg>
        <div class="gear-inner-text">
          <div class="motto1">Insert<br>Motto</div>
          <div class="motto2">Manufacture Co.</div>
        </div>
      </div>
    </div>

    <!-- CTA text + register -->
    <div class="cta-block">
      <h1>Access<br>Here</h1>
      <p>2 months free trial &middot; rolls, journeys &amp; more parts</p>
      <a href="#" class="btn-register">Register Now</a>
    </div>
  </div>

</section>

<script src="script.js" defer></script>

</body>
</html>
